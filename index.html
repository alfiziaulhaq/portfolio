    <!-- Premium Styling -->
    <style>
      :root {
        --bg-color: hsl(240, 21%, 8%);
        --card-bg: hsla(240, 21%, 12%, 0.7);
        --border-color: hsla(240, 21%, 20%, 0.4);
        --text-primary: hsl(0, 0%, 98%);
        --text-secondary: hsl(240, 5%, 75%);
        --primary-gradient: linear-gradient(135deg, hsl(270, 95%, 60%), hsl(240, 95%, 60%));
        --glow-color: hsla(255, 90%, 60%, 0.35);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Outfit', sans-serif;
        background-color: var(--bg-color);
        background-image: 
          radial-gradient(circle at 10% 20%, hsla(270, 95%, 30%, 0.15) 0%, transparent 40%),
          radial-gradient(circle at 90% 80%, hsla(240, 95%, 30%, 0.15) 0%, transparent 40%);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        perspective: 1000px;
      }

      .container {
        opacity: 0;
        transform: translateY(20px) rotateX(5deg);
        animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        width: 90%;
        max-width: 440px;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 40px 32px;
        text-align: center;
        box-shadow: 
          0 10px 30px -10px rgba(0, 0, 0, 0.7),
          0 0 40px -15px var(--glow-color);
      }

      /* Glowing Loader */
      .loader-container {
        position: relative;
        width: 80px;
        height: 80px;
        margin: 0 auto 32px;
      }

      .loader {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: hsl(270, 95%, 60%);
        border-bottom-color: hsl(240, 95%, 60%);
        animation: spin 1.2s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
      }

      .loader-inner {
        position: absolute;
        width: 80%;
        height: 80%;
        top: 10%;
        left: 10%;
        border-radius: 50%;
        border: 3px solid transparent;
        border-left-color: hsl(290, 95%, 65%);
        border-right-color: hsl(220, 95%, 55%);
        animation: spin-reverse 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
      }

      .loader-glow {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        box-shadow: 0 0 20px var(--glow-color);
        animation: pulse 2s infinite ease-in-out;
      }

      h1 {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 12px;
        background: linear-gradient(135deg, hsl(0, 0%, 100%) 30%, hsl(240, 5%, 70%) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.5px;
      }

      p {
        font-size: 15px;
        color: var(--text-secondary);
        line-height: 1.6;
        margin-bottom: 32px;
        font-weight: 300;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 14px 28px;
        background: var(--primary-gradient);
        border: none;
        border-radius: 14px;
        color: white;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 4px 15px var(--glow-color);
        position: relative;
        overflow: hidden;
      }

      .btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: 0.5s;
      }

      .btn:hover::before {
        left: 100%;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 
          0 6px 20px var(--glow-color),
          0 0 0 3px hsla(270, 95%, 60%, 0.3);
      }

      .btn:active {
        transform: translateY(0);
      }

      /* Animations */
      @keyframes fadeIn {
        to {
          opacity: 1;
          transform: translateY(0) rotateX(0deg);
        }
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes spin-reverse {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.05); opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="loader-container">
          <div class="loader-glow"></div>
          <div class="loader"></div>
          <div class="loader-inner"></div>
        </div>
        <h1>Redirecting...</h1>
        <p>
          You are being redirected to our new and optimized portfolio page.
          If you are not redirected in a few seconds, click the button below.
        </p>
        <a href="https://cv.alfizu.pro/" class="btn">Go to cv.alfizu.pro</a>
      </div>
    </div>
  </body>
</html>
